        - textbox [ref=e423]: "**This task's description IS the narrative. Edit it over time as memory and records sharpen.** Each save creates an audit-trail event so you can see how the narrative evolved. --- **Current narrative (v0 — draft):** In approximately [YEAR], while assigned to [SHIP/SQUADRON/STATION], I began experiencing severe heartburn and stomach pain. I was evaluated at [MEDICAL FACILITY — e.g., NAS Jacksonville Branch Medical Clinic], and a hiatal hernia was diagnosed/suspected. The Navy also prescribed me **isoniazid (INH)** for [tuberculosis prophylaxis / a positive PPD]. After starting INH, my stomach symptoms became significantly worse — severe heartburn, nausea, and difficulty keeping food down. I reported the worsening to [DR./CORPSMAN NAME if known]. On approximately [DATE] I underwent a **laparoscopic Nissen fundoplication** at [HOSPITAL — e.g., Naval Hospital Jacksonville]. The surgeon wrapped the top of my stomach around the bottom of my esophagus to tighten it and stop the reflux. I returned to duty after [RECOVERY PERIOD]. Since the surgery I have never been the same. I experience: - Nightly heartburn that wakes me up; I sleep with [X PILLOWS / a wedge] - Difficulty swallowing food, especially solids — food sometimes gets stuck and I have to drink water or regurgitate - Daily reflux despite [MEDICATION — e.g., omeprazole 40 mg twice daily] - Bloating, inability to belch normally, gas pain - Chest and shoulder pain after meals - I avoid [LIST TRIGGER FOODS] My condition has progressively worsened. My current provider has told me I will have to live with this for the rest of my life. --- **TODO — fill in:** - Year(s) of onset and INH prescription - Specific ship/squadron names and dates - Naming providers from STRs once received - Exact date of Nissen fundoplication - Current medications and doses - List of foods you avoid - Specific sleep accommodations - Any dilatation history (this is the rating lever)"
