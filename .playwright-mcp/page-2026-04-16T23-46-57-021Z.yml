                          - generic [ref=e3823]: The God of Lies never lied about his pain.
                          - generic [ref=e3827]: He was born a runt. abandoned by his own father, left to die in the icy ruins of Jotunheim for being too small to be Frost Giant enough.
                        - generic [ref=e3828]:
                          - img "Loki as a young boy watching Thor train, hands clenched behind his back, golden light from training ring catching tears in his eyes" [ref=e3829]
                          - generic [ref=e3834]: Adopted by Odin, raised beside Thor. loved, yes… but always second. His jealousy wasn’t born of betrayal. it was born of being seen only in contrast.
