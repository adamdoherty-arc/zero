name: golden-set-regression

# Phase 6 carousel V2 CI gate (carosel.txt §5).
#
# Runs on every PR that touches a Designer / Hook / Skeptic / Judge prompt,
# the voice files, or the brand kits. Replays the candidate prompt against
# the 200-carousel hand-rated golden set and blocks the merge if the
# composite score regresses by more than 5% within a 95% CI.
#
# Phase 6 wires the actual replay loop in ``golden_set_service.replay_against_golden``;
# until then this job runs the unit tests for the V2 services as a smoke gate.

on:
  pull_request:
    paths:
      - 'backend/app/services/carousel_v2/**'
      - 'backend/app/workflows/**'
      - 'backend/voices/**'
      - 'backend/luts/**'
      - 'backend/app/models/carousel.py'

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install minimum deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pyyaml pydantic 'sqlalchemy[asyncio]' structlog httpx

      - name: Carousel V2 unit tests
        working-directory: backend
        run: |
          python -m pytest -q tests/carousel_v2 --maxfail=5

      - name: Voice file lint
        working-directory: backend
        run: |
          python - <<'PY'
          import sys, pathlib, yaml
          required = {"property", "tone", "lexicon", "forbidden_phrases", "slide1_constraints", "hashtag_seed", "brand_kit"}
          fail = False
          for p in pathlib.Path("voices").glob("*.yml"):
              data = yaml.safe_load(p.read_text(encoding="utf-8")) or {}
              missing = required - data.keys()
              if missing:
                  print(f"::error file={p}::missing keys: {sorted(missing)}")
                  fail = True
          sys.exit(1 if fail else 0)
          PY

  golden-set-replay:
    # Phase 6 wires the real loop here. Until then this job is a placeholder
    # that succeeds — flip to ``required`` in branch protection once
    # ``replay_against_golden`` is implemented end-to-end.
    runs-on: ubuntu-latest
    needs: smoke
    if: false
    steps:
      - run: echo "golden-set replay placeholder"
