server {
    listen 80;
    listen [::]:80;
    server_name _;
    absolute_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    # index.html must never be cached (references hashed JS/CSS bundles)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Service worker must never be cached - users can get locked on an old SW
    # if we let the default 1-year cache bite here.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # PWA manifest must never be cached
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        types { } default_type "application/manifest+json";
        try_files $uri =404;
    }

    # Workbox runtime files (injectManifest generates workbox-*.js alongside sw.js)
    location ~ ^/workbox-.*\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback - all non-file routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Meetings live entirely inside zero-api. Audio capture is owned by the
    # Zero Host Audio Agent on :18796 — zero-api forwards to it as needed.
    # Long timeouts stay on the meeting paths because transcription + summary
    # pipelines can run multiple minutes.
    location ~ ^/api/(meetings|meeting-recordings|meeting-transcriptions|meeting-summaries|meeting-search|meeting-chat)(/|$) {
        proxy_pass http://zero-api:18792;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Meeting WebSockets split by owner:
    #   - recording status + live transcript are emitted by host_agent
    #     (it owns the audio + the live Whisper loop)
    #   - processing progress is emitted by zero-api's meeting pipeline
    location = /ws/meeting-recording {
        proxy_pass http://host.docker.internal:18796;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    location = /ws/meeting-live-transcript {
        proxy_pass http://host.docker.internal:18796;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    location = /ws/meeting-processing {
        proxy_pass http://zero-api:18792;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # Host agent proxy — voice enrollment, recording control, daemon ops.
    # The browser hits /host-agent/* and we forward to the Windows host.
    location /host-agent/ {
        rewrite ^/host-agent/(.*)$ /$1 break;
        proxy_pass http://host.docker.internal:18796;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # API proxy - forward to zero-api backend
    location /api/ {
        proxy_pass http://zero-api:18792;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for long-running API calls (LLM, research, etc.)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # The desktop app is iterated frequently; JS/CSS must revalidate so the
    # in-app browser does not keep an old assistant console after rebuilds.
    location ~* \.(js|css)$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Media/font assets can keep the long-lived cache behavior.
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
